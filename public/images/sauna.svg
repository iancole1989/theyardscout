<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Sauna illustration">
  <rect width="1200" height="630" fill="#F4F1E8" />

  <!-- Subtle ground line -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#D9D4C5" stroke-width="2" />

  <!-- Trees / outdoor context (subtle, behind) -->
  <g opacity="0.25" fill="#7C9885">
    <polygon points="120,500 95,430 145,430" />
    <polygon points="120,450 100,395 140,395" />
    <polygon points="1080,500 1055,430 1105,430" />
    <polygon points="1080,450 1060,395 1100,395" />
  </g>

  <!-- Steam wisps from chimney area -->
  <g fill="none" stroke="#7C9885" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <path d="M 420 230 Q 410 190, 430 160 Q 450 130, 435 100" />
    <path d="M 470 240 Q 460 200, 480 170 Q 500 140, 485 110" />
  </g>

  <!-- Barrel sauna body — elongated horizontal cylinder -->
  <ellipse cx="600" cy="430" rx="320" ry="50" fill="#1A2424" opacity="0.06" />

  <!-- Barrel main shape -->
  <rect x="370" y="280" width="460" height="200" rx="100" ry="100" fill="#EAE4D3" stroke="#1A2424" stroke-width="4" />

  <!-- Stave lines (vertical wood planks) -->
  <g stroke="#1A2424" stroke-width="1.5" opacity="0.4">
    <line x1="430" y1="285" x2="430" y2="475" />
    <line x1="490" y1="282" x2="490" y2="478" />
    <line x1="550" y1="282" x2="550" y2="478" />
    <line x1="600" y1="280" x2="600" y2="480" />
    <line x1="650" y1="282" x2="650" y2="478" />
    <line x1="710" y1="282" x2="710" y2="478" />
    <line x1="770" y1="285" x2="770" y2="475" />
  </g>

  <!-- Metal bands (horizontal) -->
  <g stroke="#1A2424" stroke-width="2.5" fill="none">
    <line x1="380" y1="320" x2="820" y2="320" />
    <line x1="380" y1="440" x2="820" y2="440" />
  </g>

  <!-- Door (front-facing end cap) -->
  <rect x="540" y="320" width="120" height="140" rx="4" fill="#0F766E" opacity="0.85" />
  <rect x="555" y="335" width="90" height="80" rx="2" fill="#7C9885" opacity="0.55" />
  <circle cx="640" cy="395" r="3" fill="#F4F1E8" />

  <!-- Chimney (small vertical pipe top-left of barrel) -->
  <rect x="410" y="220" width="14" height="65" fill="#1A2424" />
  <rect x="406" y="216" width="22" height="8" fill="#1A2424" />

  <!-- Brand wordmark area -->
  <g transform="translate(80, 540)">
    <circle cx="10" cy="14" r="10" fill="none" stroke="#0F766E" stroke-width="2.5" />
    <circle cx="10" cy="14" r="4" fill="#7C9885" />
    <text x="32" y="22" font-family="'DM Sans', system-ui, sans-serif" font-weight="600" font-size="20" fill="#1A2424">The Yard Scout</text>
  </g>
</svg>
