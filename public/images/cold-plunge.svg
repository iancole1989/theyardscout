<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Cold plunge illustration">
  <rect width="1200" height="630" fill="#F4F1E8" />

  <!-- Subtle ground line -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#D9D4C5" stroke-width="2" />

  <!-- Cold mist wisps (more wispy / colder feel than steam) -->
  <g fill="none" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" opacity="0.4">
    <path d="M 470 200 Q 460 170, 485 145 Q 510 120, 500 90" />
    <path d="M 600 180 Q 590 150, 615 125 Q 640 100, 625 70" />
    <path d="M 730 200 Q 720 170, 745 145 Q 770 120, 760 90" />
  </g>

  <!-- Shadow under tub -->
  <ellipse cx="600" cy="490" rx="240" ry="20" fill="#1A2424" opacity="0.08" />

  <!-- Cold plunge tub body — rectangular with rounded top -->
  <rect x="390" y="300" width="420" height="200" rx="12" fill="#EAE4D3" stroke="#1A2424" stroke-width="4" />

  <!-- Tub interior — cold water -->
  <rect x="410" y="320" width="380" height="160" rx="6" fill="#0F766E" opacity="0.30" />
  <rect x="410" y="320" width="380" height="160" rx="6" fill="none" stroke="#0F766E" stroke-width="2" />

  <!-- Ice cubes floating on surface -->
  <g fill="#F4F1E8" stroke="#0F766E" stroke-width="1.5">
    <rect x="450" y="340" width="32" height="22" rx="3" opacity="0.95" />
    <rect x="500" y="345" width="28" height="20" rx="3" opacity="0.9" />
    <rect x="560" y="338" width="36" height="24" rx="3" opacity="0.95" />
    <rect x="635" y="342" width="30" height="20" rx="3" opacity="0.9" />
    <rect x="685" y="338" width="34" height="22" rx="3" opacity="0.95" />
    <rect x="740" y="345" width="28" height="18" rx="3" opacity="0.9" />
  </g>

  <!-- Water surface line -->
  <line x1="410" y1="368" x2="790" y2="368" stroke="#0F766E" stroke-width="1.5" opacity="0.55" />

  <!-- Side handle / control unit -->
  <rect x="810" y="350" width="40" height="80" rx="4" fill="#1A2424" opacity="0.85" />
  <circle cx="830" cy="380" r="6" fill="#7C9885" />
  <line x1="822" y1="400" x2="838" y2="400" stroke="#F4F1E8" stroke-width="2" />
  <line x1="822" y1="412" x2="838" y2="412" stroke="#F4F1E8" stroke-width="2" />

  <!-- Brand wordmark -->
  <g transform="translate(80, 540)">
    <circle cx="10" cy="14" r="10" fill="none" stroke="#0F766E" stroke-width="2.5" />
    <circle cx="10" cy="14" r="4" fill="#7C9885" />
    <text x="32" y="22" font-family="'DM Sans', system-ui, sans-serif" font-weight="600" font-size="20" fill="#1A2424">The Yard Scout</text>
  </g>
</svg>
